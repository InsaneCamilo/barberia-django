{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body text-center">

                <h2 class="text-danger">
                    Eliminar Servicio
                </h2>

                <p class="mt-3">
                    ¿Seguro que deseas eliminar este servicio?
                </p>

                <form method="post">

                    {% csrf_token %}

                    <button class="btn btn-danger">
                        Eliminar
                    </button>

                    <a
                        href="/services/"
                        class="btn btn-secondary"
                    >
                        Cancelar
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
