{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4">
                    Actualizar Estado
                </h2>

                <div class="mb-3">

                    <strong>
                        Turno:
                    </strong>

                    {{ object.turn_code }}

                </div>

                <div class="mb-3">

                    <strong>
                        Cliente:
                    </strong>

                    {{ object.customer_name }}

                </div>

                <div class="mb-3">

                    <strong>
                        Servicio:
                    </strong>

                    {{ object.service }}

                </div>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-success w-100">

                        Actualizar Estado

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
